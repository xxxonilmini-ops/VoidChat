<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-card panel">
                <p class="eyebrow">VoidChat</p>
                <h1>Чат</h1>
                <p class="muted">Личные сообщения по ID.</p>
            </div>

            <div class="panel account-card">
                <p class="eyebrow">Профиль</p>
                <div class="profile-name" id="profileName">Загрузка...</div>
                <div class="profile-row">
                    <span>ID</span>
                    <div class="profile-inline">
                        <code id="profileId">-</code>
                        <button class="small-button" id="copyIdButton" type="button">Копировать</button>
                    </div>
                </div>
                <div class="profile-row">
                    <span>Статус</span>
                    <span id="profileOnline">-</span>
                </div>
                <div class="profile-row">
                    <span>IP</span>
                    <code id="profileIp">-</code>
                </div>
                <p class="helper-text" id="sessionHint">Подключение...</p>
            </div>

            <form class="panel search-card" id="searchForm">
                <label class="eyebrow" for="searchInput">Поиск</label>
                <input id="searchInput" autocomplete="off" placeholder="ID или имя">
                <button type="submit">Найти</button>
                <p class="helper-text" id="searchStatus">Можно искать по ID и имени.</p>
                <div class="search-results" id="searchResults"></div>
            </form>

            <div class="panel conversations-card">
                <div class="section-head">
                    <p class="eyebrow">Чаты</p>
                    <button class="ghost-button" id="settingsButton" type="button">Профиль</button>
                </div>
                <div class="conversation-list" id="conversationList"></div>
            </div>
        </aside>

        <main class="chat-panel panel">
            <div class="chat-empty" id="chatEmpty">
                <p class="eyebrow">Чат</p>
                <h2>Выбери диалог слева.</h2>
                <p class="muted">Или найди пользователя по ID.</p>
            </div>

            <section class="chat-section" id="chatSection" hidden>
                <header class="chat-header">
                    <div>
                        <p class="eyebrow">Переписка</p>
                        <h2 id="chatTitle">-</h2>
                        <p class="muted" id="chatSubtitle">-</p>
                    </div>
                </header>

                <div class="message-list" id="messageList"></div>

                <form class="composer" id="messageForm">
                    <textarea id="messageInput" rows="1" placeholder="Напиши сообщение..."></textarea>
                    <button type="submit">Отправить</button>
                </form>
            </section>
        </main>
    </div>

    <div class="modal-backdrop hidden" id="settingsModal">
        <div class="modal panel">
            <div class="modal-head">
                <div>
                    <p class="eyebrow">Настройки</p>
                    <h2>Профиль</h2>
                </div>
                <button class="ghost-button" id="closeSettingsButton" type="button">Закрыть</button>
            </div>

            <form class="settings-form" id="settingsForm">
                <label for="displayNameInput">Имя</label>
                <input id="displayNameInput" maxlength="32" placeholder="Твое имя">

                <label for="themeSelect">Тема</label>
                <select id="themeSelect">
                    <option value="dark">Темная</option>
                    <option value="light">Светлая</option>
                </select>

                <button type="submit">Сохранить</button>
                <p class="helper-text" id="settingsStatus">Можно изменить имя и тему.</p>
            </form>

            <div class="log-block">
                <p class="eyebrow">Журнал</p>
                <div class="activity-log" id="activityLog"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
